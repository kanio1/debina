resolved_dependency_narrowings_2026_07_16:
  # Applied by a dedicated research pass (dependency-inventory deep-dive) this session.
  # Full evidence quotes: agent research transcript folded into
  # planning/BACKLOG-REDESIGN.md "Second dependency-narrowing pass (2026-07-16)".
  - candidate: EPIC-14/Story 14.1
    decision: ADD MISSING EDGE
    from: "depends_on: [] (no edge to EPIC-46 or EPIC-47 at any granularity)"
    to: "depends_on: [EPIC-46-egress-delivery-attempts-retry/Story 46.1, EPIC-47-egress-delivery-receipts-five-status/Story 47.1]"
    reason: >
      Story 14.1's own grant-test asserts egress is sole writer of three tables
      (outbound_messages, transport_attempts, delivery_receipts); only outbound_messages
      was reachable before. transport_attempts is created by EPIC-46/46.1,
      delivery_receipts by EPIC-47/47.1 — both previously unlinked. Not a narrowing (no
      prior edge existed to narrow), a genuinely missing edge. No cycle: 46.1/47.1 both
      have depends_on: [], and EPIC-46/45's back-references point at Story 14.2, not 14.1.
  - candidate: EPIC-24/Story 24.7
    decision: OPEN QUESTION
    from: "depends_on: [EPIC-12-reference-data-ownership]"
    to: "depends_on: [EPIC-12-reference-data-ownership/Story 12.1] + [OPEN-QUESTION] note (not READY)"
    reason: >
      EPIC-12/12.1 narrowing is correct but insufficient — this story also needs a
      reference-data CRUD write-endpoint capability (POST/PUT /api/v1/reference-data/
      {catalog}, per sepa-nexus-message-flow-and-data-blueprint.md §7.2) that no epic or
      story in /planning/ currently owns building. Recorded as an open question, not
      marked READY, per the "don't invent architecture" rule.
  - candidate: EPIC-51
