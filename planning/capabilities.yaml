# SEPA Nexus — capability registry (human-readable companion to capability-graph.json)
#
# This file is the authoring/reading source for the capability model built during the
# 2026-07-16 dual-agent governance and backlog redesign session. The machine-checked graph
# (nodes + edges + cycle detection) lives in capability-graph.json and is validated by
# tools/agent-config/validate-capability-graph.py — this YAML does not need its own parser
# and is not read by any script; keep the two in sync by hand when either changes.
#
# POST-SPLIT NOTE (2026-07-16): the `capabilities:` section below documents the state as
# inventoried BEFORE this session's story splits were applied to planning/epics/*.md, for
# traceability (it's the evidence the splits were based on). The epic files themselves and
# capability-graph.json (regenerated after the splits, 0 cycles) are the current source of
# truth for story IDs (31.3 -> 31.3A, 10.1 -> 10.1A-E, 23.1 -> 23.1A/B, 24.2 -> 24.2A/B,
# 25.3 -> 25.3A-E, 27.4 -> 27.4+27.5) and dependency narrowings (35.1, 20.3) — see
# planning/BACKLOG-REDESIGN.md "Old-to-new mapping" for the authoritative table.
#
# Two granularities, by design (see planning/BACKLOG-REDESIGN.md for why):
#   - EPIC nodes: the 66 epics not deep-dived this session keep the epic-level depends_on
#     already recorded in planning/README.md (confirmed to match each file's own
#     frontmatter, zero mismatches found).
#   - EPIC_AGGREGATE nodes: the 12 epics deep-dived this session (plus targeted individual
#     stories in EPIC-14/45/46, evidenced by name) get real story-level nodes. An
#     aggregate always REQUIRES all of its own story children.
#
# A story->epic (rather than story->story) dependency is a smell, not automatically a
# defect — but every one of them should be a deliberate choice, not an accident, because
# an unqualified epic reference silently pulls in every story inside that epic, including
# ones added later. Two of these silent pulls turned out to close real cycles (see below).

version: 1
generated: "2026-07-16"

status_vocabulary:
  formal: [not-started, in-progress, blocked, done]
  readiness: [READY, DECISION-BLOCKED, CAPABILITY-BLOCKED, SOURCE-BLOCKED,
              ITERATION-BLOCKED, INFRASTRUCTURE-BLOCKED, IMPLEMENTED-BUT-UNVERIFIED,
              DOCUMENTATION-STALE, DONE]

decision_gates:
  - id: gate.EPIC-10.10_1.security-definer
    blocks: [EPIC-10.10.1, EPIC-10.10.2]
    requires: >
      User acceptance of the SECURITY DEFINER recommendation recorded in
      /EPIC-10-transaction-coordination-decision-memo.md (status: PROPOSED — REQUIRES
      USER ACCEPTANCE), or a request for further proof / an alternative mechanism.
    evidence: >
      Two full local, reversible proof suites already exist and pass (SET LOCAL ROLE:
      9/9 across two classes, rejected for a proven JPA flush-timing hazard; SECURITY
      DEFINER: 18/18 across five classes, including a real executed-and-defended
      CVE-2007-2138-class search_path attack). Nothing is blocked by missing evidence —
      only by the pending human decision.
    status: OPEN

resolved_cycles:
  - id: cycle.signature-egress
    hypothesis: H1
    members: [EPIC-31/Story 31.3 (now 31.3A), EPIC-43/Story 43.2]
    shape: "Story A depends on the whole of Epic B (unqualified); a story inside Epic B depends specifically back on Story A."
    precedent: >
      The identical shape (Story 31.2 <-> EPIC-19/Story 19.2) was already found and fixed
      once in this same file by re-granulating to story level — this pair was not given
      the same treatment until now.
    resolution_applied: >
      Story 31.3 split into 31.3A (standalone signing capability, depends only on 31.1) and
      the egress-invocation detail absorbed into EPIC-43 Story 43.2, which now depends on
      31.3A. Applied directly to planning/epics/EPIC-31-signature-module.md and
      EPIC-43-egress-rail-outbound-dispatch.md. Verified cycle-free by
      tools/agent-config/validate-capability-graph.py.
  - id: cycle.egress-transport-status-vs-finality
    hypothesis: null  # discovered incidentally while building the graph, not one of H1-H10
    members: [EPIC-14/Story 14.3, EPIC-39/Story 39.4]
    shape: "Same shape as H1: Story 14.3 -> whole EPIC-39 (unqualified); Story 39.4 -> EPIC-14/Story 14.3 (specific)."
    resolution_applied: >
      EPIC-14 Story 14.3 narrowed to depend on EPIC-39/Story 39.2 specifically. EPIC-39
      Story 39.4 no longer depends on EPIC-14/14.3 at all — both assert the identical
      shared test (DeliveredNotFinalTest, already marked "współdzielony" in EPIC-39's own
      file) and now carry a shared-test note instead of a blocking cross-reference. Applied
      to planning/epics/EPIC-14-egress-boundary-ownership.md and
      EPIC-39-settlement-finality-model.md. Verified cycle-free.

