services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: sepa_nexus
      POSTGRES_USER: sepa_migration
      POSTGRES_PASSWORD: dev-only-migration
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: dev-only-admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: dev-only-keycloak-db
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:Z

  keycloak-postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: dev-only-keycloak-db
    volumes:
      - keycloak-pgdata:/var/lib/postgresql

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Single-broker dev cluster: Kafka's built-in default of 3 for internal topics
      # (__consumer_offsets, __transaction_state) can never be satisfied here, silently
      # breaking every consumer group (INVALID_REPLICATION_FACTOR on auto-create).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9092:9092"

volumes:
  pgdata: {}
  keycloak-pgdata: {}
