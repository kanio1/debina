schema: ../backend/src/main/resources/graphql/schema.graphqls
documents: src/graphql/**/*.graphql
generates:
  src/generated/graphql.ts:
    plugins:
      - typescript-operations
config:
  avoidOptionals: true
  onlyOperationTypes: true
  preResolveTypes: false
  scalars:
    ID: string
    String: string
    Boolean: boolean
