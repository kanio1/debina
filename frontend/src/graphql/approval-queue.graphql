query ApprovalQueue($first: Int!, $after: String) {
  approvalQueue(first: $first, after: $after) {
    items {
      approvalId
      paymentId
      approvalStatus
      makerUserId
      submittedAt
      expiresAt
      expiredButUnprocessed
      matrixRuleId
      amount
      currency
      debtorIban
      creditorIban
    }
    nextCursor
  }
}

query Approval($paymentId: ID!) {
  approval(paymentId: $paymentId) {
    approvalId
    paymentId
    approvalStatus
    makerUserId
    submittedAt
    expiresAt
    expiredButUnprocessed
    matrixRuleId
    amount
    currency
    debtorIban
    creditorIban
    decisionComment
    decidedAt
  }
}

query PaymentAuditTrail($paymentId: ID!, $first: Int!, $after: String) {
  paymentAuditTrail(paymentId: $paymentId, first: $first, after: $after) {
    items { auditEntryId tenantId branchId occurredAt actorType actorId authorizedRole correlationId commandType targetType targetId paymentId batchId outcome decisionComment beforeState { approvalId approvalStatus } afterState { approvalId approvalStatus } }
    nextCursor
  }
}

query PaymentIsoEvidence($paymentId: ID!) {
  paymentIsoEvidence(paymentId: $paymentId) {
    paymentId
    messages { isoMessageId messageType messageVersion versionEffectiveFrom lineageRole lineageRecordedAt }
    identifiers { isoMessageId type value }
  }
}

query AuditEntries($auditFilter: AuditQueryFilter!, $first: Int!, $after: String) {
  auditEntries(filter: $auditFilter, first: $first, after: $after) {
    items { auditEntryId tenantId branchId occurredAt actorType actorId authorizedRole correlationId commandType targetType targetId paymentId batchId outcome decisionComment beforeState { approvalId approvalStatus } afterState { approvalId approvalStatus } }
    nextCursor
  }
}
