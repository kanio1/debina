spring:
  application:
    name: sepa-nexus-backend
  datasource:
    url: ${SEPA_APP_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}
    username: ${SEPA_APP_DB_USER:sepa_app}
    password: ${SEPA_APP_DB_PASSWORD:dev-only-app}
  flyway:
    url: ${SEPA_MIGRATION_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}
    user: ${SEPA_MIGRATION_DB_USER:sepa_migration}
    password: ${SEPA_MIGRATION_DB_PASSWORD:dev-only-migration}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/sepa-nexus}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
outbox:
  datasource:
    url: ${OUTBOX_RELAY_DB_URL:${SEPA_APP_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}}
    username: ${OUTBOX_RELAY_DB_USER:outbox_dispatcher_role}
    password: ${OUTBOX_RELAY_DB_PASSWORD:dev-only-outbox-dispatcher}
sepa:
  scheduling:
    enabled: ${SEPA_SCHEDULING_ENABLED:true}
signature:
  datasource:
    url: ${SEPA_SIGNATURE_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}
    username: ${SEPA_SIGNATURE_DB_USER:signature_role}
    password: ${SEPA_SIGNATURE_DB_PASSWORD:dev-only-signature}
ledger:
  datasource:
    url: ${SEPA_LEDGER_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}
    username: ${SEPA_LEDGER_DB_USER:ledger_role}
    password: ${SEPA_LEDGER_DB_PASSWORD:dev-only-ledger}
settlement:
  datasource:
    url: ${SEPA_SETTLEMENT_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}
    username: ${SEPA_SETTLEMENT_DB_USER:settlement_role}
    password: ${SEPA_SETTLEMENT_DB_PASSWORD:dev-only-settlement}
gross-instant:
  datasource:
    url: ${GROSS_INSTANT_DB_URL:jdbc:postgresql://localhost:5432/sepa_nexus}
    username: ${GROSS_INSTANT_DB_USER:gross_instant_executor_role}
    password: ${GROSS_INSTANT_DB_PASSWORD:dev-only-gross-instant-executor}
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
