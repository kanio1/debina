# Ordinary Spring test contexts must not create background relay work. Kafka relay integration
# tests deliberately replace this property and the broker endpoint with Testcontainers values.
sepa.scheduling.enabled=false
spring.kafka.admin.auto-create=false
spring.kafka.listener.auto-startup=false
outbox.datasource.url=${spring.datasource.url}
outbox.datasource.username=${spring.datasource.username}
outbox.datasource.password=${spring.datasource.password}
signature.datasource.url=${spring.datasource.url}
signature.datasource.username=${spring.datasource.username}
signature.datasource.password=${spring.datasource.password}
approval-expiry.datasource.url=${spring.datasource.url}
approval-expiry.datasource.username=approval_expiry_role
approval-expiry.datasource.password=dev-only-approval-expiry
audit-auditor.datasource.url=${spring.datasource.url}
audit-auditor.datasource.username=audit_auditor_role
audit-auditor.datasource.password=dev-only-audit-auditor
