status: DAGGER_ARCHITECTURE_REVIEW_RUNTIME_PROVEN
authority: repository commands remain authoritative; Dagger orchestrates them
engine:
  current: v0.21.4
  candidate: v0.21.7
  decision: DEFER
  reason: candidate focused proofs pass, but a repo-only engineVersion change breaks ordinary commands with the installed v0.21.4 CLI

automatic_checks:
  canonical:
    name: acceptance
    directive: "+check"
    command: dagger check --progress=plain
  forbidden_topology:
    automatic_children: [fast, integration, smoke-suite, smoke, smoke-auth, smoke-payments, pipeline-assurance, phase-d, all-socket-free, all]
    regression: dagger/pure/check_topology_test.go

callable_gates:
  fast:
    membership: [governance, dagger-module-self-verification, backend-fast, frontend-fast]
  integration:
    membership:
      - backend-regression-without-testcontainers
      - frontend-production-build
      - postgres-readiness
      - flyway-fresh-database
      - flyway-upgrade-from-v54
      - postgres-rls-and-grants
      - kafka-readiness-and-non-production-probe
  smoke-suite:
    membership: [smoke-auth, smoke-payments]
    execution: sequential
    contract: complete capped ADR-N16 browser-smoke classification
  smoke:
    deprecated_alias_of: smoke-suite
  smoke-auth:
    contract: separately callable D3A login/session/health compatibility gate
  smoke-payments:
    execution: sequential
    journeys: [json-direct-submission, maker-checker-approval, payment-detail-lineage]
  pipeline-assurance:
    membership: [failure-propagation, bounded-timeouts, dependency-unavailability, failure-artifact-redaction, cache-output-determinism, cache-output-input-sensitivity, service-binding-dns]
    contract: verification-platform behavior only; no product test membership
  acceptance:
    membership: [fast, integration, smoke-suite]
    contract: pipeline-assurance is independent and must never be an acceptance child
    socket: none
  phase-d:
    deprecated_alias_of: acceptance
  all-socket-free:
    deprecated_alias_of: acceptance
  all:
    deprecated_alias_of: acceptance
  full-local:
    membership: [acceptance, testcontainers-regression]
    socket: required typed Dagger Socket argument

testcontainers:
  command: dagger call testcontainers-regression --runtime-socket=/run/podman/podman.sock
  contract: explicit and mounted only into the dedicated Maven container
  environment:
    - DOCKER_HOST=unix:///var/run/docker.sock
    - TESTCONTAINERS_HOST_OVERRIDE=host.containers.internal

images:
  declarations: dagger/main.go
  inventory_count: 10
  lockfile: .dagger/lock
  normal_mode: developer default
  proof_mode: frozen
  update_mode: live
  regressions: dagger/pure/image_lock_test.go
  frozen_missing_entry: fail-closed-proven

workspace:
  constructor_input: auto-injected Workspace
  exclusions: [.git, node_modules, .next, target, build, coverage, test-results, playwright-report, runtime-logs]
  boundaries:
    backend: [mvnw, .mvn, backend, infra/asyncapi/asyncapi.yaml, infra/keycloak/realm-export.json]
    frontend: [frontend, backend/src/main/resources/graphql/schema.graphqls]
    dagger: [dagger]
    governance: [filtered-repository-root]
  dependency_precision:
    pnpm_install: [frontend/package.json, frontend/pnpm-lock.yaml, frontend/pnpm-workspace.yaml]
  diagnostic: source-boundary-digest

caches:
  named:
    - {name: debina-maven-jdk25, content: Maven dependencies, sharing: SHARED}
    - {name: debina-pnpm-node24.18.0-pnpm10.33.0, content: pnpm content-addressed store, sharing: SHARED}
    - {name: debina-dagger-go-1.26.5, content: Go modules, sharing: SHARED}
  trace_runner: tools/ci/verify-dagger-cache.sh
  statuses:
    - OUTPUT-DETERMINISM-PROVEN
    - CACHE-REUSE-TRACE-PROVEN
    - SELECTIVE-INVALIDATION-TRACE-PROVEN
  volume_stress:
    function: cache-volume-stress
    namespace: hash-isolated
    reset: fixture-files-only

services:
  stateful: [postgresql, kafka, keycloak-postgresql, keycloak, backend, frontend]
  lifecycle: lazy bindings; no host ports; no manual Start/Stop
  dns_regression: service-binding-dns
  candidate_proof: passed on v0.21.4 and v0.21.7

secrets:
  transport: [dag.SetSecret, WithSecretVariable]
  forbidden: [plaintext-password-env, returned-secret-file, stable-secret-cache-key]
  redaction_proof: failure-artifact-redaction

assurance:
  callable_gate: pipeline-assurance
  expected_failures:
    leaves: [child-non-zero, bounded-timeout, postgres-unavailable, kafka-unavailable, keycloak-unavailable, backend-unavailable, frontend-unavailable, browser-navigation-failure]
    contract: non-zero child plus exact PHASE-D EXPECTED classification marker
  unexpected_child_propagation:
    function: aggregate-unexpected-failure-probe
    expected_result: non-zero with PHASE-D UNEXPECTED CHILD FAILURE
  log_health:
    runner: tools/ci/verify-dagger-log-health.sh
    rejects: [NullPointerException, uncaught-exception, JVM-thread-exception, panic, fatal-startup, runtime-ERROR, runtime-FATAL]
    exact_bootstrap_allowlist:
      - 'Keycloak PostgreSQL: relation "migration_model" does not exist before schema initialization'
      - 'Keycloak PostgreSQL: relation "public.databasechangeloglock" does not exist before Liquibase initialization'
  service_binding_dns: service-binding-dns

generators:
  bindings: dagger develop -y
  bindings_hash_idempotence: proven
  generate_check: dagger check --generate
  graphql: regenerated and byte-compared inside fast

observability:
  source: Dagger plain progress/OpenTelemetry spans
  artifacts: /tmp only
  timing_policy: observational; no single-run SLA
  performance_review: docs/ci/DAGGER-ARCHITECTURE-REVIEW-2026-07-23.md

non_goals: [GitHub-Actions, Jenkins, act, Dagger-Cloud, remote-cache, deployment, Phase-E, payment-feature-expansion]
