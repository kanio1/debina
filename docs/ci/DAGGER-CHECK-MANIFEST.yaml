status: IN_PROGRESS
authority: repository commands remain authoritative; Dagger orchestrates them
fast:
  implemented:
    - name: governance
      command: bash tools/agent-config/validate-enterprise-governance.sh
      reason: authoritative enterprise governance runner
    - name: dagger-module-self-verification
      commands: [go test ./..., go vet ./..., gofmt-drift-check]
      reason: validates the generated local Go SDK module without host mutation
    - name: backend-compile-and-architecture-fitness
      command: ./mvnw -f backend -DskipTests compile, then selected Maven tests
      tests: [ModularityTest, OwnershipArchRulesTest, PaymentNoGodModuleTest, ClockPortEnforcementTest, RuntimeDatasourceOwnershipTest, SchedulerActivationGuardTest]
      reason: pure architecture and source-boundary tests; Testcontainers/runtime tests remain integration-only
    - name: frontend-codegen-lint-typecheck
      commands: [pnpm install --frozen-lockfile, pnpm run codegen:graphql, direct-graphql-output-comparison, pnpm run lint, pnpm run typecheck]
      reason: exact Node 24.18.0 and pnpm 10.33.0 source feedback without a full runtime
integration:
  implemented:
    - name: backend-regression-without-testcontainers
      command: ./mvnw -f backend -Dtest=<explicit-current-socket-free-subset> test
      result: 128 tests; all existing Testcontainers-backed classes are deliberately excluded
    - name: frontend-production-build
      command: pnpm run build
    - name: postgres-readiness
      command: pg_isready against ephemeral Dagger PostgreSQL 18 service
    - name: flyway-fresh-database
      command: Maven Flyway migrate + validate on a fresh ephemeral PostgreSQL 18 service
    - name: flyway-upgrade-from-v54
      command: Maven Flyway migrate + validate at V54, then migrate + validate at V60
      baseline: docs/ci/FLYWAY-UPGRADE-BASELINE.md
    - name: postgres-rls-and-grants
      command: real-role PostgreSQL probes after fresh migration
    - name: kafka-readiness-and-non-production-probe
      command: pinned apache/kafka:4.1.1 single-broker create, produce, consume probe
  blocked:
    testcontainers-backed-backend-regression:
      reason: Dagger v0.21.4 execution containers have no supported Host socket accessor; Testcontainers 2.0.5 requires a Docker-compatible Unix API socket and cannot reach the selected rootful Podman API without the prohibited socket bridge.
smoke:
  pending:
    authority: ADR-N16
    journeys: [keycloak-login, bff-session, health-runtime, json-direct-submission, maker-checker-approval, payment-detail-lineage]
non_goals: [GitHub-Actions, act, remote-CI, deployment, payment-features]
